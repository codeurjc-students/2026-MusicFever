name: Set Completed Issues as Pending Merge

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  issues: read

env:
  PROJECT_OWNER: ${{ github.repository_owner }}
  PROJECT_NUMBER: "50"

  STATUS_FIELD_NAME: "Status"
  IN_REVIEW_OPTION_NAME: "Pending Merge"

jobs:
  move-subissues-to-in-review:
    name: Move referenced subissues to In review
    runs-on: ubuntu-latest

    if: github.event.deleted == false

    env:
      GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}

    steps:
      # ---------------------------------------------------------
      # Detects Closes #N, Fixes #N o Resolves #N in pushed commits
      # ---------------------------------------------------------
      - name: Find referenced issues
        id: referenced-issues
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY' > /tmp/issues.txt
          import json
          import os
          import re

          with open(os.environ["GITHUB_EVENT_PATH"], encoding="utf-8") as file:
              event = json.load(file)

          current_repository = os.environ["GITHUB_REPOSITORY"].lower()

          pattern = re.compile(
              r"""
              \b
              (?:
                  close[sd]?
                | fix(?:e[sd])?
                | resolve[sd]?
              )
              \s*:?\s*
              (?:(?P<repository>[A-Za-z0-9_.-]+/[A-Za-z0-9_.-]+))?
              \#(?P<number>\d+)
              \b
              """,
              re.IGNORECASE | re.VERBOSE,
          )

          issue_numbers = set()

          for commit in event.get("commits", []):
              message = commit.get("message", "")

              for match in pattern.finditer(message):
                  referenced_repository = match.group("repository")

                  if (
                      referenced_repository is None
                      or referenced_repository.lower() == current_repository
                  ):
                      issue_numbers.add(int(match.group("number")))

          for number in sorted(issue_numbers):
              print(number)
          PY

          if [[ ! -s /tmp/issues.txt ]]; then
            echo "No closing issue references found."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Referenced issues:"
          cat /tmp/issues.txt

          echo "found=true" >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------
      # Obtain project, Status attribute and Pending Merge option
      # ---------------------------------------------------------
      - name: Get project data
        if: steps.referenced-issues.outputs.found == 'true'
        id: project
        shell: bash
        run: |
          set -euo pipefail

          PROJECT_QUERY=$(cat <<'GRAPHQL'
          query(
            $owner: String!,
            $number: Int!
          ) {
            user(login: $owner) {
              projectV2(number: $number) {
                id

                fields(first: 100) {
                  nodes {
                    ... on ProjectV2SingleSelectField {
                      id
                      name

                      options {
                        id
                        name
                      }
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          PROJECT_JSON="$(
            gh api graphql \
              -f query="$PROJECT_QUERY" \
              -f owner="$PROJECT_OWNER" \
              -F number="$PROJECT_NUMBER" \
            | jq -c '.data.user.projectV2'
          )"

          if [[ -z "$PROJECT_JSON" || "$PROJECT_JSON" == "null" ]]; then
            echo "::error::Personal project ${PROJECT_OWNER}/${PROJECT_NUMBER} not found."
            exit 1
          fi

          PROJECT_ID="$(
            jq -r '.id' <<< "$PROJECT_JSON"
          )"

          STATUS_FIELD_ID="$(
            jq -r \
              --arg field "$STATUS_FIELD_NAME" \
              '
              [
                .fields.nodes[]
                | select(.name == $field)
                | .id
              ][0] // empty
              ' \
              <<< "$PROJECT_JSON"
          )"

          IN_REVIEW_OPTION_ID="$(
            jq -r \
              --arg field "$STATUS_FIELD_NAME" \
              --arg option "$IN_REVIEW_OPTION_NAME" \
              '
              [
                .fields.nodes[]
                | select(.name == $field)
                | .options[]?
                | select(.name == $option)
                | .id
              ][0] // empty
              ' \
              <<< "$PROJECT_JSON"
          )"

          if [[ -z "$STATUS_FIELD_ID" ]]; then
            echo "::error::Field '${STATUS_FIELD_NAME}' not found."
            exit 1
          fi

          if [[ -z "$IN_REVIEW_OPTION_ID" ]]; then
            echo "::error::Option '${IN_REVIEW_OPTION_NAME}' not found."
            exit 1
          fi

          {
            echo "project_id=$PROJECT_ID"
            echo "status_field_id=$STATUS_FIELD_ID"
            echo "in_review_option_id=$IN_REVIEW_OPTION_ID"
          } >> "$GITHUB_OUTPUT"

      # ---------------------------------------------------------
      # Check if issue has a father, then move it to Pending Merge
      # ---------------------------------------------------------
      - name: Move referenced subissues to In review
        if: steps.referenced-issues.outputs.found == 'true'
        shell: bash
        env:
          PROJECT_ID: ${{ steps.project.outputs.project_id }}
          STATUS_FIELD_ID: ${{ steps.project.outputs.status_field_id }}
          IN_REVIEW_OPTION_ID: ${{ steps.project.outputs.in_review_option_id }}
        run: |
          set -euo pipefail

          REPOSITORY_OWNER="${GITHUB_REPOSITORY%%/*}"
          REPOSITORY_NAME="${GITHUB_REPOSITORY#*/}"

          ISSUE_QUERY=$(cat <<'GRAPHQL'
          query(
            $owner: String!,
            $repository: String!,
            $number: Int!
          ) {
            repository(owner: $owner, name: $repository) {
              issue(number: $number) {
                number
                url

                parent {
                  number
                  title
                }

                projectItems(first: 100) {
                  nodes {
                    id

                    project {
                      id
                    }
                  }
                }
              }
            }
          }
          GRAPHQL
          )

          while IFS= read -r ISSUE_NUMBER; do
            [[ -z "$ISSUE_NUMBER" ]] && continue

            echo "Processing issue #${ISSUE_NUMBER}..."

            ISSUE_JSON="$(
              gh api graphql \
                -f query="$ISSUE_QUERY" \
                -f owner="$REPOSITORY_OWNER" \
                -f repository="$REPOSITORY_NAME" \
                -F number="$ISSUE_NUMBER"
            )"

            ISSUE_EXISTS="$(
              jq -r '.data.repository.issue != null' <<< "$ISSUE_JSON"
            )"

            if [[ "$ISSUE_EXISTS" != "true" ]]; then
              echo "::warning::Issue #${ISSUE_NUMBER} does not exist."
              continue
            fi

            PARENT_NUMBER="$(
              jq -r '.data.repository.issue.parent.number // empty' \
                <<< "$ISSUE_JSON"
            )"

            # No mover issues padre o issues independientes.
            if [[ -z "$PARENT_NUMBER" ]]; then
              echo "Issue #${ISSUE_NUMBER} is not a subissue; leaving it unchanged."
              continue
            fi

            echo "Issue #${ISSUE_NUMBER} is a subissue of #${PARENT_NUMBER}."

            ISSUE_URL="$(
              jq -r '.data.repository.issue.url' <<< "$ISSUE_JSON"
            )"

            PROJECT_ITEM_ID="$(
              jq -r \
                --arg project_id "$PROJECT_ID" \
                '
                [
                  .data.repository.issue.projectItems.nodes[]?
                  | select(.project.id == $project_id)
                  | .id
                ][0] // empty
                ' \
                <<< "$ISSUE_JSON"
            )"

            if [[ -z "$PROJECT_ITEM_ID" ]]; then
              echo "Subissue #${ISSUE_NUMBER} is not in the project. Adding it..."

              PROJECT_ITEM_ID="$(
                gh project item-add "$PROJECT_NUMBER" \
                  --owner "$PROJECT_OWNER" \
                  --url "$ISSUE_URL" \
                  --format json \
                  --jq '.id'
              )"
            fi

            gh project item-edit \
              --id "$PROJECT_ITEM_ID" \
              --project-id "$PROJECT_ID" \
              --field-id "$STATUS_FIELD_ID" \
              --single-select-option-id "$IN_REVIEW_OPTION_ID"

            echo "Subissue #${ISSUE_NUMBER} moved to '${IN_REVIEW_OPTION_NAME}'."
            echo "Parent issue #${PARENT_NUMBER} was not modified."
          done < /tmp/issues.txt